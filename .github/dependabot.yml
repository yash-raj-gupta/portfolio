version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      # Batch all minor + patch bumps into one PR per week so the inbox stays quiet.
      minor-and-patch:
        update-types:
          - minor
          - patch
    # Major bumps stay as individual PRs so they get reviewed carefully
    # (Astro 5 → 6 etc. usually need config changes).

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
    commit-message:
      prefix: "chore(ci)"
